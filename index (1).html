<!DOCTYPE html>
<html lang="pt">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Business | @A.Niel</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    
    <style>
        /* Reset de Estilos */
        * { margin: 0; padding: 0; box-sizing: border-box; }

        body {
            font-family: 'Inter', -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            min-height: 100vh;
            margin: 0;
            overflow-x: hidden;
            background-color: #f8fafc;
            padding-bottom: 100px;
        }

        /* Fundo de Partículas Interativas */
        #network-canvas {
            position: fixed;
            top: 0; left: 0; width: 100%; height: 100%;
            z-index: -1;
            opacity: 0.6;
        }

        /* Botão de Play Superior (Estilo Mercado Livre) */
        #music-control {
            position: fixed;
            top: 25px;
            right: 25px;
            width: 48px;
            height: 48px;
            background: #FFF159;
            border: none;
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            color: #333;
            cursor: pointer;
            z-index: 2000;
            box-shadow: 0 4px 15px rgba(0,0,0,0.15);
            transition: all 0.3s cubic-bezier(0.175, 0.885, 0.32, 1.275);
        }

        #music-control:hover { 
            transform: scale(1.1) rotate(15deg); 
            box-shadow: 0 6px 20px rgba(0,0,0,0.2);
        }

        #youtube-player { display: none; }

        /* Estrutura Principal */
        .content-wrapper {
            display: flex;
            flex-direction: column;
            align-items: center;
            z-index: 1;
            padding: 20px;
            width: 100%;
        }

        /* Cartão do Cabeçalho */
        .header-container {
            display: flex;
            align-items: center;
            justify-content: flex-start;
            gap: 20px;
            margin-bottom: 15px;
            width: 100%;
            max-width: 400px;
            background: #ffffff;
            padding: 15px;
            border-radius: 24px;
            border: 1px solid #e2e8f0;
            box-shadow: 0 10px 25px rgba(0,0,0,0.03);
        }

        .profile-img {
            width: 70px;
            height: 70px;
            border-radius: 18px;
            object-fit: cover;
            border: 2px solid #334155;
        }

        h1 { font-size: 1.6rem; color: #0f172a; font-weight: 700; letter-spacing: -0.5px; }

        .tagline { 
            font-size: 0.85rem; color: #64748b; font-weight: 600;
            margin-bottom: 35px; text-transform: uppercase;
            letter-spacing: 1.5px; text-align: center;
        }

        /* Links das Redes Sociais */
        .links-container { width: 100%; max-width: 400px; }

        .link-card {
            display: flex;
            align-items: center;
            justify-content: space-between;
            text-decoration: none;
            padding: 18px 25px;
            margin-bottom: 12px;
            border-radius: 16px;
            font-weight: 700;
            transition: all 0.3s ease;
            color: #ffffff;
            box-shadow: 0 4px 10px rgba(0,0,0,0.1);
        }

        .youtube { background-color: #FF0000; }
        .instagram { background: linear-gradient(45deg, #f09433 0%, #e6683c 25%, #dc2743 50%, #cc2366 75%, #bc1888 100%); }
        .facebook { background-color: #1877F2; }

        .link-card:hover { transform: translateY(-3px); filter: brightness(1.1); }

        /* Rodapé Mercado Livre Premium */
        .footer-ad-modern {
            position: fixed; bottom: 20px; left: 50%; transform: translateX(-50%);
            width: 92%; max-width: 450px;
            background: #FFF159;
            border-radius: 16px; height: 60px; 
            display: flex; align-items: center; z-index: 1000; 
            text-decoration: none; overflow: hidden;
            box-shadow: 0 12px 30px rgba(0,0,0,0.15);
            border: 2px solid #3483fa;
        }

        .ad-btn {
            background: #3483fa;
            color: #ffffff; font-size: 10px; 
            font-weight: 800; padding: 0 20px; height: 100%; 
            display: flex; align-items: center; text-transform: uppercase;
            letter-spacing: 1px;
        }

        .marquee-wrapper { flex: 1; overflow: hidden; }

        .marquee-content {
            display: inline-block; white-space: nowrap;
            animation: marquee-modern 25s linear infinite;
            color: #333;
            font-size: 13px;
            font-weight: 600;
        }
        .marquee-content span { margin-right: 60px; }

        @keyframes marquee-modern { from { transform: translateX(100%); } to { transform: translateX(-100%); } }
    </style>
</head>
<body>

    <div id="music-control" onclick="toggleMusic()">
        <i id="music-icon" class="fas fa-play"></i>
    </div>

    <div id="youtube-player"></div>

    <canvas id="network-canvas"></canvas>

    <div class="content-wrapper">
        <div class="header-container">
            <img src="https://i.ibb.co/RG3hC6n7/1759764626350.png" alt="Profile" class="profile-img">
            <h1>@A.Niel</h1>
        </div>
        
        <p class="tagline">Soluções Estratégicas & Performance</p>

        <div class="links-container">
            <a href="https://youtube.com/@projetoshape_br?si=csl-SZHiJTi3LaZU" target="_blank" class="link-card youtube">
                YouTube Hub <i class="fab fa-youtube"></i>
            </a>
            <a href="https://instagram.com" target="_blank" class="link-card instagram">
                Instagram Business <i class="fab fa-instagram"></i>
            </a>
            <a href="https://facebook.com" target="_blank" class="link-card facebook">
                Facebook Page <i class="fab fa-facebook-f"></i>
            </a>
        </div>
    </div>

    <a href="https://meli.la/2JYVynt" target="_blank" class="footer-ad-modern">
        <div class="ad-btn">VER OFERTAS <i class="fas fa-shopping-cart" style="margin-left: 8px;"></i></div>
        <div class="marquee-wrapper">
            <div class="marquee-content">
                <span>🔥 OFERTAS IMPERDÍVEIS NO MERCADO LIVRE! 🔥</span>
                <span>⚡ PRODUTOS PARA ELEVAR O SEU SHAPE COM PREÇO JUSTO! ⚡</span>
                <span>🚚 ENTREGA MAIS RÁPIDA DO BRASIL! APROVEITE! 🚚</span>
            </div>
        </div>
    </a>

    <script src="https://www.youtube.com/iframe_api"></script>

    <script>
        // Gerenciamento da Playlist
        let player;
        let isPlaying = false;
        function onYouTubeIframeAPIReady() {
            player = new YT.Player('youtube-player', {
                height: '0', width: '0', listType: 'playlist',
                list: 'PLRBp0Fe2Gpgn8Y9qI-p0aTxVtw8onBSFj',
                playerVars: { 'loop': 1, 'shuffle': 1 },
                events: { 'onReady': () => {} }
            });
        }
        function toggleMusic() {
            const icon = document.getElementById('music-icon');
            if (!isPlaying) {
                player.playVideo(); icon.className = 'fas fa-pause'; isPlaying = true;
            } else {
                player.pauseVideo(); icon.className = 'fas fa-play'; isPlaying = false;
            }
        }

        // Configuração Visual das Partículas
        const canvas = document.getElementById('network-canvas');
        const ctx = canvas.getContext('2d');
        canvas.width = window.innerWidth;
        canvas.height = window.innerHeight;
        let atoms = [];

        class Atom {
            constructor() {
                this.x = Math.random() * canvas.width;
                this.y = Math.random() * canvas.height;
                this.speedX = Math.random() * 0.8 - 0.4;
                this.speedY = Math.random() * 0.8 - 0.4;
                this.size = Math.random() * 2;
            }
            update() {
                this.x += this.speedX; this.y += this.speedY;
                if (this.x > canvas.width || this.x < 0) this.speedX *= -1;
                if (this.y > canvas.height || this.y < 0) this.speedY *= -1;
            }
            draw() {
                ctx.fillStyle = '#94a3b8';
                ctx.beginPath(); ctx.arc(this.x, this.y, this.size, 0, Math.PI * 2); ctx.fill();
            }
        }

        function init() { for (let i = 0; i < 50; i++) atoms.push(new Atom()); }
        function connect() {
            for (let a = 0; a < atoms.length; a++) {
                for (let b = a; b < atoms.length; b++) {
                    let distance = ((atoms[a].x - atoms[b].x)**2 + (atoms[a].y - atoms[b].y)**2)**0.5;
                    if (distance < 150) {
                        ctx.strokeStyle = `rgba(148, 163, 184, ${0.4 - distance/150})`;
                        ctx.lineWidth = 0.5;
                        ctx.beginPath(); ctx.moveTo(atoms[a].x, atoms[a].y); ctx.lineTo(atoms[b].x, atoms[b].y); ctx.stroke();
                    }
                }
            }
        }
        function animate() {
            ctx.clearRect(0, 0, canvas.width, canvas.height);
            atoms.forEach(atom => { atom.update(); atom.draw(); });
            connect();
            requestAnimationFrame(animate);
        }
        window.addEventListener('resize', () => { canvas.width = window.innerWidth; canvas.height = window.innerHeight; });
        init(); animate();
    </script>
</body>
</html>
